services:
  # === PostgreSQL ===
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finsovetnik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 111
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === AI Service (FastAPI + YandexGPT) ===
  ai:
    build: ./ai-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"

  # === Spring Boot Backend ===
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finsovetnik
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 111
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      # ✅ Исправлено: убран /api/v1, так как в Python теперь /api
      AI_SERVICE_URL: http://ai:8000/api
      # CORS для фронтенда
      SPRING_WEB_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"

  # === React Frontend (Vite Build + Serve) ===
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      # ✅ ВАЖНО: фронтенд в браузере обращается к localhost:8080 (хост), а не к backend:8080 (Docker сеть)
      VITE_WS_URL: ws://localhost:8080/ws
      VITE_API_URL: http://localhost:8080

volumes:
  pgdata: