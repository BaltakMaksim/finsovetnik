services:
  # === PostgreSQL ===
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finsovetnik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 111
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === AI Service (FastAPI + YandexGPT) ===
  ai:
    build: ./ai-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    # ✅ ИСПРАВЛЕНО: healthcheck через python
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # === Spring Boot Backend ===
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finsovetnik
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 111
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      AI_SERVICE_URL: http://ai:8000
      SPRING_WEB_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"

  # === React Frontend ===
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_WS_URL: ws://localhost:8080/ws
      VITE_API_URL: http://localhost:8080

volumes:
  pgdata: