version: '3.8'

services:
  # ============================================
  # PostgreSQL
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: finsovetnik-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
        - "127.0.0.1:5432:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - finsovetnik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend (Spring Boot)
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: finsovetnik-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
    # ports:
    #   - "127.0.0.1:${BACKEND_PORT}:8080"  # Только локально!
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finsovetnik-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # AI Service (Python)
  # ============================================
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: finsovetnik-ai-service
    restart: always
    env_file:
    - .env
    environment:
    # Помечаем, что мы в Docker
      DOCKER_ENV: "true"
      # OpenAI (если переключишься)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Провайдер LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-yandexgpt}
      
      # Ollama (Локальная модель)
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      
      # YandexGPT (Облачная модель)
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      YANDEX_MODEL: ${YANDEX_MODEL:-yandexgpt-5-lite/latest}
      
      # Edge TTS (Озвучка)
      VOICE: ${VOICE:-ru-RU-DmitryNeural}
      
      # Настройки приложения
      DEBUG: ${DEBUG:-True}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-600}
      MAX_TEXT_LENGTH: ${MAX_TEXT_LENGTH:-3000}
    # ports:
    #   - "127.0.0.1:${AI_SERVICE_PORT}:8000"  # Только локально!
    volumes:
      - whisper_models:/root/.cache/huggingface
    networks:
      - finsovetnik-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Frontend (React)
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: finsovetnik-frontend
    restart: always
    # ports:
    #   - "127.0.0.1:${FRONTEND_PORT}:80"  # Только локально!
    networks:
      - finsovetnik-network

  # ============================================
  # Nginx (Reverse Proxy)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: finsovetnik-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - ai-service
    networks:
      - finsovetnik-network

volumes:
  postgres_data:
  whisper_models:

networks:
  finsovetnik-network:
    driver: bridge