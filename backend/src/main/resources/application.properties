# Порт Spring Boot
server.port=8080

# Адрес вашего Python AI-сервиса (из переменной окружения)
ai.service.url=${AI_SERVICE_URL:http://ai:8000}

# Подключение к PostgreSQL (из переменных окружения)
spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/finsovetnik}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

# Настройки JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Логирование
logging.level.ru.finsovetnik=DEBUG

# JWT настройки (из переменных окружения)
app.jwt.secret=${JWT_SECRET:FinSovetnikSecretKey2026VeryLongStringForSecurityMinimum256BitsRequired}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

#  Лимит размера загружаемого файла (10 МБ)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB